name: Rebuild data.bin

# Regenerates data.bin from the nba-boxscores database (fresh recent seasons +
# frozen history + sheet positions). Run on a schedule and on demand.
on:
  workflow_dispatch: {}        # manual "Run workflow" button
  schedule:
    - cron: "30 13 * * *"      # daily 13:30 UTC (after the nba-boxscores daily updater)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Build data.bin
        run: |
          python scripts/build_databin.py \
            --history data_history.bin \
            --positions positions.csv \
            --recent-from 2025 \
            --out data.bin
      - name: Commit if changed
        run: |
          git config user.name  "databin-bot"
          git config user.email "databin-bot@users.noreplace.github.com"
          if ! git diff --quiet data.bin; then
            git add data.bin
            git commit -m "chore: rebuild data.bin ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "data.bin unchanged — nothing to commit."
          fi
