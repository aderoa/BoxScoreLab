name: Rebuild data.bin

# Regenerates data.bin from the nba-boxscores database (fresh recent seasons +
# frozen history + sheet positions). Run on a schedule and on demand.
on:
  workflow_dispatch: {}        # manual "Run workflow" button
  schedule:
    - cron: "30 13 * * *"      # daily 13:30 UTC (after the nba-boxscores daily updater)

# Allow the workflow's bot to push the rebuilt data.bin back to the repo.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Build data.bin + salaries.json
        run: |
          python scripts/build_databin.py \
            --history data_history.bin \
            --positions positions.csv \
            --salaries-sheet salaries_sheet.csv \
            --salaries-out salaries.json \
            --salary-season 2025 \
            --salary-col-header "2026" \
            --season-cap 154647000 \
            --recent-from 2025 \
            --out data.bin
      - name: Commit if changed
        run: |
          git config user.name  "databin-bot"
          git config user.email "databin-bot@users.noreplace.github.com"
          git add data.bin salaries.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: rebuild data.bin + salaries ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "data.bin & salaries unchanged — nothing to commit."
          fi
